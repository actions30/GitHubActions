name: Notify parent repo to update submodule

on:
  push:
    branches:
      - main
      - develop
      - "release/*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger parent repo workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PARENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/your-org/parent-repo/dispatches \
            -d '{"event_type": "child-updated"}'
